  #   environment:
  #     MARIADB_DATABASE: ${MARIADB_DATABASE:-grav_db}
  #     MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootpassword}
  #     MARIADB_USER: ${MARIADB_USER:-grav_user}
  #     MARIADB_PASSWORD: ${MARIADB_PASSWORD:-userpassword}
  #   volumes:
  #     - dbdata:/var/lib/mysql
  #     - ./config/mysql/custom.cnf:/etc/mysql/conf.d/custom.cnf
  #   networks:
  #     - grav-network

  # # Adminer Database Manager
  # adminer:
  #   image: adminer:latest
  #   container_name: grav-lamp-adminer
  #   restart: always
  #   ports:
  #     - "${ADMINER_PORT:-8080}:8080"
  #   environment:
  #     ADMINER_DEFAULT_SERVER: db
  #   depends_on:
  #     - db
  #   networks:
  #     - grav-network

