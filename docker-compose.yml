services:
  # LAMP Web Application
  webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3-apache}
    container_name: grav-lamp-web
    restart: always
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
      SERVER_ADMIN: ${SERVER_ADMIN:-webmaster@localhost}
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./src:/var/www/html
      - ./logs/apache:/var/log/apache2
      - ./logs/php:/var/log/php
      - ./config/apache/000-default.conf:/etc/apache2/sites-available/000-default.conf
      - ./config/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini

  ## Comment out for Mariadb fuctionality
    # depends_on:
    #   - db
    networks:
      - grav-network

  ## Comment out for Mariadb and Adminer fuctionality
