services:
  # LAMP Web Application
  webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PHP_VERSION: ${PHP_IMAGE:-php:8.3-apache}
    container_name: grav-lamp-web
    # Restart policy configured via RESTART_POLICY in .env (unless-stopped, always, on-failure, no)
    restart: ${RESTART_POLICY:-unless-stopped}
    environment:
      SERVER_NAME: ${SERVER_NAME:-www.example.com}
      SERVER_ADMIN: ${SERVER_ADMIN:-webmaster@example.com}
    # Direct host ports (comment out if using Traefik reverse proxy)
    ports:
      - "${HTTP_PORT:-80}:80"
    # Host volume mounts configured via .env variables (SRC_PATH, LOGS_*_PATH, CONFIG_*_PATH)
    volumes:
      - ${SRC_PATH:-./src}:/var/www/html
      - ${LOGS_APACHE_PATH:-./logs/apache}:/var/log/apache2
      - ${LOGS_PHP_PATH:-./logs/php}:/var/log/php
      - ${CONFIG_APACHE_PATH:-./config/apache/000-default.conf}:/etc/apache2/sites-available/000-default.conf
      - ${CONFIG_PHP_PATH:-./config/php/custom.ini}:/usr/local/etc/php/conf.d/custom.ini
    # depends_on:
    #   - db
    networks:
      - grav-network
      # - traefik # Uncomment to enable Traefik support
    # Traefik Reverse Proxy Configuration:
    # To use Traefik, uncomment the labels below and the traefik network, and comment out 'ports:' above.
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.docker.network=traefik"
    #   # Route rule for www.example.com
    #   - "traefik.http.routers.webserver.rule=Host(`${SERVER_NAME:-www.example.com}`)"
    #   # Only bind to websecure (Traefik automatically redirects port 80 -> 443)
    #   - "traefik.http.routers.webserver.entrypoints=websecure"
    #   # Enable TLS and specify the Let's Encrypt resolver from Traefik
    #   - "traefik.http.routers.webserver.tls=true"
    #   - "traefik.http.routers.webserver.tls.certresolver=letsencrypt"
    #   # Override NetBird proxy priority catch-all rule
    #   - "traefik.http.routers.webserver.priority=10"
    #   # Target internal Apache HTTP port
    #   - "traefik.http.services.webserver.loadbalancer.server.port=80"

  # MariaDB Database
  db:
    # Enabled via COMPOSE_PROFILES=db,adminer (or COMPOSE_PROFILES=db) in .env file
    profiles: ["db"]
    image: mariadb:${MARIADB_VERSION:-latest}
    container_name: grav-lamp-db
    # Restart policy configured via RESTART_POLICY in .env (unless-stopped, always, on-failure, no)
    restart: ${RESTART_POLICY:-unless-stopped}
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-grav_db}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootpassword}
      MARIADB_USER: ${MARIADB_USER:-grav_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-userpassword}
    # Host volume mounts & persistent DB storage volume configured via .env variables
    volumes:
      - ${DB_VOLUME_NAME:-dbdata}:/var/lib/mysql
      - ${CONFIG_MYSQL_PATH:-./config/mysql/custom.cnf}:/etc/mysql/conf.d/custom.cnf
    networks:
      - grav-network

  # Adminer Database Manager
  adminer:
    # Enabled via COMPOSE_PROFILES=db,adminer in .env file
    profiles: ["adminer"]
    image: adminer:latest
    container_name: grav-lamp-adminer
    # Restart policy configured via RESTART_POLICY in .env (unless-stopped, always, on-failure, no)
    restart: ${RESTART_POLICY:-unless-stopped}
    # Direct host ports (comment out if using Traefik reverse proxy)
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    networks:
      - grav-network
      # - traefik # Uncomment to enable Traefik support
    # Traefik Reverse Proxy Configuration:
    # To use Traefik, uncomment the labels below and the traefik network, and comment out 'ports:' above.
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.docker.network=traefik"
    #   # Route rule for www.example.com/adminer
    #   - "traefik.http.routers.adminer.rule=Host(`${SERVER_NAME:-www.example.com}`) && PathPrefix(`/adminer`)"
    #   # Only bind to websecure (Traefik automatically redirects port 80 -> 443)
    #   - "traefik.http.routers.adminer.entrypoints=websecure"
    #   # Enable TLS and specify the Let's Encrypt resolver from Traefik
    #   - "traefik.http.routers.adminer.tls=true"
    #   - "traefik.http.routers.adminer.tls.certresolver=letsencrypt"
    #   # Override NetBird proxy priority catch-all rule
    #   - "traefik.http.routers.adminer.priority=10"
    #   # Strip /adminer path prefix before proxying to Adminer backend
    #   - "traefik.http.routers.adminer.middlewares=adminer-stripprefix"
    #   - "traefik.http.middlewares.adminer-stripprefix.stripprefix.prefixes=/adminer"
    #   # Target internal Adminer HTTP port
    #   - "traefik.http.services.adminer.loadbalancer.server.port=8080"

networks:
  grav-network:
    driver: bridge
  # External network for Traefik reverse proxy (Uncomment to enable)
  # traefik:
  #   external: true

volumes:
  dbdata: