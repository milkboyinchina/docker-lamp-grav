streams:
  schemes:
    theme:
      type: ReadOnlyStream
      prefixes:
        '':
          - user/themes/hadron
          - user/themes/quark

grid-size: grid-lg
blog-page: /blog
hide_title: false
dropdown:
  enabled: true
custommenus:
  enabled: false
menu:
  - text: GitHub
    icon: github
    url: 'https://github.com/milkboyinchina'
    target: _blank
langswitcher:
  enable: true
  display: inline
  format: icon
header-fixed: true
header-animated: true
header-dark: false
header-transparent: false
sticky-footer: true
spectre:
  exp: false
  icons: false
production-mode: true
h5pembedrootpath: 'https://h5p.org/h5p/embed/'
fontawesome:
  solid: false
  regular: false
  brands: false
  brand: false
blog_page_hero_classes: 'text-light title-h1h2 overlay-dark-gradient hero-large parallax'
invert_logo: false
favicon:
  user/themes/hadron/images/milkboy-favicon.png:
    name: milkboy-favicon.png
    full_path: milkboy-favicon.png
    type: image/png
    size: 8745
    path: user/themes/hadron/images/milkboy-favicon.png
custom_logo:
  user/themes/hadron/images/logo/milkboy-logo.png:
    name: milkboy-logo.png
    full_path: milkboy-logo.png
    type: image/png
    size: 95284
    path: user/themes/hadron/images/logo/milkboy-logo.png
custom_logo_mobile:
  user/themes/hadron/images/logo/milkboy-logo-mobile.png:
    name: milkboy-logo-mobile.png
    full_path: milkboy-logo-mobile.png
    type: image/png
    size: 27798
    path: user/themes/hadron/images/logo/milkboy-logo-mobile.png
